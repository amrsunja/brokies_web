<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1520" viewBox="0 0 720 1520" fill="none">
  <defs>
    <linearGradient id="bg" x1="360" y1="0" x2="360" y2="1520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-5%" width="140%" height="110%">
      <feGaussianBlur stdDeviation="24" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="720" height="1520" fill="url(#bg)"/>
  <rect x="48" y="120" width="624" height="200" rx="24" fill="#111827" stroke="#FFC107" stroke-opacity="0.35"/>
  <circle cx="180" cy="220" r="56" fill="#1F2937" stroke="#FFD700" stroke-width="4" filter="url(#glow)"/>
  <rect x="280" y="188" width="320" height="28" rx="8" fill="#374151"/>
  <rect x="280" y="232" width="200" height="20" rx="6" fill="#6B7280" opacity="0.8"/>
  <rect x="48" y="360" width="624" height="120" rx="20" fill="#0B1120" stroke="#111827"/>
  <text x="360" y="430" text-anchor="middle" fill="#FACC15" font-family="Georgia, serif" font-size="32" font-weight="600">Brokies</text>
  <text x="360" y="470" text-anchor="middle" fill="#6B7280" font-family="system-ui,sans-serif" font-size="16">Replace with assets/hero.png</text>
</svg>
